name: Poll HKJC Odds (Cron)

on:
  # schedule:
  #   - cron: "*/5 * * * *"   # every 5 min
  #   - cron: "*/10 * * * *"  # every 10 min
     - cron: "0 * * * *"     # every hour
  workflow_dispatch: # 允許手動觸發測試

jobs:
  poll-odds:
    runs-on: ubuntu-latest
    steps:
      - name: Call Netlify Function
        run: |
          curl -X POST "https://masterjoe2.netlify.app/.netlify/functions/poll-odds" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          --fail --silent --show-error
